name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # so the release workflow can gate on this exact job

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ERC/DRC tests shell out to kicad-cli, so the real thing has to be here.
      - name: Install KiCad
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends kicad
          kicad-cli --version

      - run: npm ci
      - run: npm run lint:md
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # The published tarball is what users get; make sure it still packs.
      - run: npm pack --dry-run
